# SISTEMICAR — Netlify (frontend estático + API serverless)

[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**", "shared/**"]

[functions.api]
  timeout = 26
  memory = 1024

# API Express → función serverless (ruta original /api/* se conserva con force)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA (wouter) — después de la regla /api
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
