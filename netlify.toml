# SISTEMICAR — Netlify (frontend estático + API serverless)

[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Instalar devDependencies (vite, tsx) necesarias para npm run build
  NPM_CONFIG_PRODUCTION = "false"

[functions]
  node_bundler = "esbuild"

# Plan Free: máximo 10s. Plan Pro: hasta 26s.
[functions.api]
  timeout = 10
  memory = 1024
  included_files = ["dist/index.cjs"]

# API Express → función serverless
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA (wouter)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
